metadata:
  version: 0.1-french-large
  purpose: Large French cuisine recipe templates for pantry-based suggestion engine
  design_rules:
  - If a title names a key ingredient, that ingredient appears as main or required.
  - Broad categories are used mainly in accepts, not as a replacement for named title ingredients.
  - Water is included as a technological ingredient, but should be treated as always available by inventory logic.
  - Cream, milk and cheese are kept explicit; broad dairy is avoided as a direct substitute for liquid dairy.
  - French mother sauces and components are included as reusable component recipes.
  - These are ingredient templates, not exact step-by-step recipes.
  - 'Time buckets: under_10, under_30, under_60, over_60.'
  cuisines:
    french: французская
  quantity_scale:
  - spice
  - little
  - normal
  - many
  source_notes:
  - Soup block emphasizes onion soup, potages, bouillabaisse, bisques, garbure and cream soups.
  - Main block emphasizes wine stews, duck, rabbit, lamb, seafood, quiche, galettes and Provençal vegetables.
  - Components include mother sauces, emulsified sauces, mirepoix, bouquet garni, potato sides, pâtés and rillettes.
  - Dessert block includes custards, choux pastry, tarts, crêpes, cakes and regional pastry.
