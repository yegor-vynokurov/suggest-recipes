metadata:
  version: 0.6-indian-large
  purpose: Large Indian cuisine recipe templates for pantry-based suggestion engine
  design_rules:
  - If a title names a key ingredient, that ingredient appears as main or required.
  - Broad categories are used mainly in accepts, not as a replacement for named title ingredients.
  - Water is included as a technological ingredient, but should be treated as always available by inventory logic.
  - These are ingredient templates, not exact step-by-step recipes.
  - 'Time buckets: under_10, under_30, under_60, over_60.'
  cuisines:
    indian: индийская
  quantity_scale:
  - spice
  - little
  - normal
  - many
  source_notes:
  - First-course block includes dal, sambar, rasam, shorba, kadhi and kootu-like dishes.
  - Main block emphasizes curries, paneer dishes, vegetable sabzi, biryani/pulao, rice breakfasts, dosa/idli/appam family,
    and tandoor-style dishes.
  - Bread/snack block includes roti, chapati, naan, paratha, poori, bhatura, samosa, pakora, vada and chaat-style street foods.
  - Dessert block includes kheer/payasam, gulab jamun, jalebi, rasgulla/rasmalai, halwa, ladoo, barfi, kulfi and festival
    sweets.
