metadata:
  version: 0.1-scandinavian-large
  purpose: Large Scandinavian and Nordic cuisine recipe templates for pantry-based suggestion engine
  design_rules:
  - If a title names a key ingredient, that ingredient appears as main or required.
  - Broad categories are used mainly in accepts, not as a replacement for named title ingredients.
  - Water is included as a technological ingredient, but should be treated as always available by inventory logic.
  - Cream, milk, sour cream and cheese are kept explicit; broad dairy is avoided as a direct substitute for liquid dairy.
  - Nordic preservation patterns such as curing, smoking, pickling and fermenting are represented as methods/tags.
  - These are ingredient templates, not exact step-by-step recipes.
  - 'Time buckets: under_10, under_30, under_60, over_60.'
  cuisines:
    scandinavian: скандинавская / североевропейская
    nordic: новая северная / общесеверная
    norwegian: норвежская
    swedish: шведская
    danish: датская
    finnish: финская
    icelandic: исландская
    faroese: фарерская
  quantity_scale:
  - spice
  - little
  - normal
  - many
  source_notes:
  - Norwegian block emphasizes fårikål, fish soup, potato dumplings, cured/fermented fish, lamb, pork belly, lefse, porridge
    and cloudberry desserts.
  - Swedish block emphasizes meatballs, gravlax, herring, potato dishes, casseroles, open sandwich/cake formats and classic
    fika sweets.
  - Danish block emphasizes smørrebrød, pork belly, frikadeller, roast pork, red cabbage, tartlets, hot dogs and Christmas
    desserts.
  - Finnish block emphasizes salmon soup, Karelian pies, rye bread, reindeer, casseroles, fish, berry desserts and cinnamon-cardamom
    buns.
  - Icelandic/Faroese block emphasizes lamb, fish, skyr, rye bread, smoked/fermented meat and fish, and simple North Atlantic
    desserts.
  - Cross-Nordic block includes pantry-friendly modern Nordic templates based on rye, barley, roots, berries, mushrooms, fish
    and dairy.
