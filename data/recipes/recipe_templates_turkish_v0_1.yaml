metadata:
  version: 0.6-turkish-large
  purpose: Large Turkish cuisine recipe templates for pantry-based suggestion engine
  design_rules:
  - If a title names a key ingredient, that ingredient appears as main or required.
  - Broad categories are used mainly in accepts, not as a replacement for named title ingredients.
  - Water is included as a technological ingredient, but should be treated as always available by inventory logic.
  - These are ingredient templates, not exact step-by-step recipes.
  - 'Time buckets: under_10, under_30, under_60, over_60.'
  cuisines:
    turkish: турецкая
  quantity_scale:
  - spice
  - little
  - normal
  - many
  source_notes:
  - Soup list draws on common Turkish soups such as mercimek, ezogelin, yayla, tarhana, iskembe, kelle paca, beyran, toyga,
    tutmac, sehriye, tavuk suyu and balik corbasi.
  - 'Main dishes emphasize Turkish patterns: kofte, kebab, pide, borek, gozleme, manti, dolma/sarma, pilav, eggplant dishes,
    legumes, meze and salads.'
  - Desserts emphasize milk puddings, syrup pastries, helva, lokum, asure and fruit-in-syrup desserts.
