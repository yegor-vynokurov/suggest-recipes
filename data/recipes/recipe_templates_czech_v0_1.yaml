metadata:
  version: 0.1-czech-large
  purpose: Large Czech cuisine recipe templates for pantry-based suggestion engine
  design_rules:
  - If a title names a key ingredient, that ingredient appears as main or required.
  - Broad categories are used mainly in accepts, not as a replacement for named title ingredients.
  - Water is included as a technological ingredient, but should be treated as always available by inventory logic.
  - Czech dumplings, sauces, pork roasts, sour cabbage and cream sauces keep their key ingredients explicit.
  - These are ingredient templates, not exact step-by-step recipes.
  - 'Time buckets: under_10, under_30, under_60, over_60.'
  cuisines:
    czech: чешская
  quantity_scale:
  - spice
  - little
  - normal
  - many
  source_notes:
  - Soup block emphasizes česnečka, bramboračka, kulajda, kyselice, dršťková, gulášová, vývar and lentil/pea/bean soups.
  - Main block emphasizes svíčková, rajská, koprová, guláš, vepřo knedlo zelo, roast duck/goose, schnitzel, fried cheese,
    carp and potato dishes.
  - Component/snack block includes houskový knedlík, bramborový knedlík, rohlíky, chlebíčky, pomazánky, utopenci and nakládaný
    hermelín.
  - Dessert block includes buchty, koláče, frgál, bublanina, štrúdl, perník, medovník, vánočka, ovocné knedlíky, palačinky,
    trdelník and Czech pastry.
