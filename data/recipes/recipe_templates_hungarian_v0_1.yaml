metadata:
  version: 0.1-hungarian-large
  purpose: Large Hungarian cuisine recipe templates for pantry-based suggestion engine
  design_rules:
  - If a title names a key ingredient, that ingredient appears as main or required.
  - Broad categories are used mainly in accepts, not as a replacement for named title ingredients.
  - Water is included as a technological ingredient, but should be treated as always available by inventory logic.
  - Paprika-heavy Hungarian stews and soups keep paprika explicit as required/spice where it defines the dish.
  - These are ingredient templates, not exact step-by-step recipes.
  - 'Time buckets: under_10, under_30, under_60, over_60.'
  cuisines:
    hungarian: венгерская
  quantity_scale:
  - spice
  - little
  - normal
  - many
  source_notes:
  - Soup block emphasizes gulyásleves, halászlé, húsleves, Jókai bableves, Palócleves, korhelyleves, fruit soups and vegetable
    soups.
  - Main block emphasizes pörkölt, paprikás, lecsó, stuffed cabbage, stuffed peppers, rakott dishes, főzelék, nokedli, tarhonya
    and breaded dishes.
  - Snack/side block includes lángos, pogácsa, nokedli, csipetke, tarhonya, cucumber salads, pickles, körözött and sausage
    plates.
  - Dessert block includes Dobos torta, Esterházy, Somlói galuska, Kürtőskalács, palacsinta, gombóc, mákos guba, bejgli, rétes,
    zserbó, krémes and fánk.
