metadata:
  version: 0.6-ukrainian-large
  purpose: Large Ukrainian cuisine recipe templates for pantry-based suggestion engine
  design_rules:
  - If a title names a key ingredient, that ingredient appears as main or required.
  - Broad categories are used mainly in accepts, not as a replacement for named title ingredients.
  - Water is included as a technological ingredient, but should be treated as always available by inventory logic.
  - Pork ears, tails, hocks, pork belly and salo are explicit ingredients, not hidden behind generic meat.
  - These are ingredient templates, not exact step-by-step recipes.
  - 'Time buckets: under_10, under_30, under_60, over_60.'
  cuisines:
    ukrainian: украинская
  quantity_scale:
  - spice
  - little
  - normal
  - many
  source_notes:
  - First-course block emphasizes borscht variants, kapusniak, yushka, kulesh, green borscht and grain/bean soups.
  - Main block emphasizes varenyky, pelmeni, holubtsi, deruny, banosh, buckwheat dishes, pork offal, kholodets, salo and home-style
    roasts.
  - Dessert block emphasizes syrnyky, kutia, uzvar, pampushky, medivnyk, poppy-seed pastries, nalysnyky, kissel and cottage-cheese
    dishes.
