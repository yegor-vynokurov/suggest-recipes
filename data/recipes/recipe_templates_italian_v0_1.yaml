metadata:
  version: 0.1-italian-large
  purpose: Large Italian cuisine recipe templates for pantry-based suggestion engine
  design_rules:
  - If a title names a key ingredient, that ingredient appears as main or required.
  - Broad categories are used mainly in accepts, not as a replacement for named title ingredients.
  - Water is included as a technological ingredient, but should be treated as always available by inventory logic.
  - These are ingredient templates, not exact step-by-step recipes.
  - 'Time buckets: under_10, under_30, under_60, over_60.'
  cuisines:
    italian: итальянская
  quantity_scale:
  - spice
  - little
  - normal
  - many
  source_notes:
  - 'Collection follows the Italian meal structure: antipasti, primi, secondi, contorni, dolci, plus breads and sauces.'
  - 'Primi emphasize pasta, risotto and soups: carbonara, cacio e pepe, amatriciana, pesto, ragù, lasagne, gnocchi, seafood
    pasta, minestrone, ribollita and regional grain/bean soups.'
  - 'Secondi emphasize meat, fish, poultry and vegetable mains: ossobuco, saltimbocca, cotoletta, cacciatore, parmigiana,
    baccalà, sarde, calamari, frittata and stuffed vegetables.'
  - Breads and pizza include margherita, marinara, calzone, focaccia, piadina, panzerotti, taralli and grissini.
  - Desserts include tiramisù, panna cotta, cannoli, cassata, pastiera, sfogliatelle, zabaglione, gelato, crostata, panettone,
    pandoro and regional nut pastries.
